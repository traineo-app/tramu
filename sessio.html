<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>traineo — Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;background:#F1EFE8;min-height:100vh;color:#111110}
    .app{max-width:390px;margin:0 auto;min-height:100vh;background:#FAF9F5;padding-bottom:6rem}
    .hero{background:#163A28;padding:1rem 1.25rem 1.75rem;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#4A9E6B}
    .nav{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
    .btn-back{background:rgba(255,255,255,.1);border:.5px solid rgba(255,255,255,.15);color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-logo{font-size:1rem;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:-.3px}
    .nav-neo{color:rgba(255,255,255,.3)}
    .hero-icon{font-size:2.2rem;margin-bottom:.4rem}
    .hero-label{font-size:.62rem;color:#4A9E6B;text-transform:uppercase;letter-spacing:.16em;font-weight:600;margin-bottom:.35rem}
    .hero-title{font-size:1.7rem;font-weight:600;color:#fff;letter-spacing:-.5px;margin-bottom:.6rem;line-height:1.1}
    .hero-bullets{display:flex;flex-direction:column;gap:.35rem}
    .hero-bullet{font-size:.82rem;color:rgba(255,255,255,.65);display:flex;align-items:flex-start;gap:.5rem;line-height:1.5;font-weight:500}
    .hero-bullet-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0;margin-top:.45rem}
    .body{padding:1.25rem}
    .section{margin-bottom:1.5rem}
    .section-title{font-size:.66rem;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.14em;margin-bottom:.75rem}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.25rem;gap:1rem}
    .spinner{width:42px;height:42px;border:3px solid #E8E6DF;border-top-color:#163A28;border-radius:50%;animation:spin .8s linear infinite}
    .loading-text{font-size:.85rem;color:#888780;text-align:center;font-weight:500;line-height:1.5}
    .summary-card{background:#EBF5EF;border:.5px solid rgba(74,158,107,.25);border-radius:12px;padding:.9rem 1rem;display:flex;gap:.6rem;align-items:flex-start;margin-bottom:1.5rem}
    .summary-dot{width:6px;height:6px;border-radius:50%;background:#163A28;flex-shrink:0;margin-top:5px}
    .summary-text{font-size:.82rem;color:#163A28;line-height:1.55;font-weight:500}
    .zones-row{display:flex;gap:5px;margin-bottom:.6rem}
    .zone{flex:1;border-radius:8px;padding:8px 3px;text-align:center;opacity:.35;transition:all .15s}
    .zone.active{opacity:1;transform:scale(1.06)}
    .zone-label{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:#fff;letter-spacing:.5px;line-height:1}
    .zone-range{font-size:.58rem;color:rgba(255,255,255,.85);margin-top:2px;font-weight:600}
    .zone-target{font-size:.78rem;color:#888780;font-weight:500}
    .zone-target strong{color:#163A28;font-weight:600}
    .blocks{display:flex;flex-direction:column;gap:6px}
    .block{background:#fff;border:.5px solid #E8E6DF;border-radius:11px;padding:.85rem 1rem;display:flex;align-items:center;gap:.85rem}
    .block-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
    .block-info{flex:1;min-width:0}
    .block-title{font-size:.9rem;font-weight:600;color:#111110;margin-bottom:2px;letter-spacing:-.1px}
    .block-sub{font-size:.76rem;color:#888780;font-weight:500;line-height:1.4}
    .block-time{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#163A28;flex-shrink:0;letter-spacing:.5px}
    .exercises{display:flex;flex-direction:column;gap:6px}
    .exercise{background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:.9rem 1rem;display:flex;align-items:flex-start;gap:.85rem}
    .ex-num{width:34px;height:34px;border-radius:8px;background:#EBF5EF;border:1px solid #163A28;color:#163A28;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.95rem;flex-shrink:0;letter-spacing:.5px}
    .ex-info{flex:1;min-width:0}
    .ex-name{font-size:.92rem;font-weight:600;color:#111110;margin-bottom:3px;letter-spacing:-.1px}
    .ex-detail{font-size:.78rem;color:#888780;margin-bottom:6px;line-height:1.45;font-weight:500}
    .ex-muscle{font-size:.66rem;font-weight:600;padding:2px 9px;border-radius:20px;background:#EBF5EF;color:#163A28;display:inline-block;text-transform:uppercase;letter-spacing:.05em}
    .tip{background:#fff;border:.5px solid #E8E6DF;border-radius:11px;padding:.9rem 1rem;display:flex;gap:.65rem;align-items:flex-start}
    .tip-dot{width:6px;height:6px;border-radius:50%;background:#4A9E6B;margin-top:5px;flex-shrink:0}
    .tip-text{font-size:.82rem;color:#5F5E5A;line-height:1.6;font-weight:500}
    .export-card{background:#111110;border-radius:12px;padding:.9rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:6px}
    .export-title{font-size:.86rem;font-weight:600;color:#fff;margin-bottom:2px}
    .export-sub{font-size:.7rem;color:rgba(255,255,255,.45);font-weight:500}
    .btn-export{background:#4A9E6B;border:none;color:#0A1F12;font-size:.74rem;font-weight:700;font-family:'Inter',sans-serif;padding:.6rem .9rem;border-radius:8px;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
    .err-box{background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:1.25rem;text-align:center}
    .err-text{font-size:.84rem;color:#888780;font-weight:500;margin-bottom:.85rem;line-height:1.5}
    .btn-retry{background:#163A28;color:#fff;border:none;border-radius:9px;padding:.6rem 1.25rem;font-size:.78rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#FAF9F5;border-top:.5px solid #E8E6DF;padding:.85rem 1.25rem;display:flex;gap:.6rem;z-index:50}
    .btn-ver{background:#fff;border:.5px solid #E8E6DF;color:#163A28;border-radius:11px;padding:.9rem 1rem;font-size:.8rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap}
    .btn-empezar{flex:1;background:#163A28;color:#fff;border:none;border-radius:11px;padding:.9rem;font-size:.92rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.02em}
    .btn-empezar:disabled{opacity:.4;cursor:not-allowed}
    .guided{display:none;position:fixed;inset:0;background:#163A28;z-index:200;flex-direction:column;align-items:center;justify-content:space-between;padding:2rem 1.5rem;max-width:390px;margin:0 auto}
    .guided.open{display:flex}
    .guided-header{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.5rem}
    .guided-step-info{font-size:.72rem;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
    .btn-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:.9rem;flex-shrink:0}
    .guided-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:230px}
    .gdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s}
    .gdot.done{background:rgba(255,255,255,.5)}
    .gdot.active{background:#fff;transform:scale(1.4)}
    .gdot.rest{background:rgba(255,255,255,.12)}
    .guided-body{display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;justify-content:center;gap:.65rem;width:100%}
    .guided-type{font-size:.66rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
    .guided-big{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;color:#fff;letter-spacing:1px;line-height:.95}
    .guided-name{font-size:1.45rem;font-weight:600;color:#fff;letter-spacing:-.3px;line-height:1.2}
    .guided-detail{font-size:.86rem;color:rgba(255,255,255,.55);line-height:1.5;font-weight:500;max-width:280px}
    .guided-zone-badge{background:rgba(255,255,255,.12);border-radius:20px;padding:.32rem .95rem;font-size:.78rem;color:#fff;font-weight:600}
    .guided-timer{font-family:'Bebas Neue',sans-serif;font-size:3.6rem;color:#fff;letter-spacing:1px}
    .guided-timer-lbl{font-size:.7rem;color:rgba(255,255,255,.35);font-weight:500}
    .guided-muscle{font-size:.74rem;color:rgba(255,255,255,.4);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
    .guided-ex-num{width:68px;height:68px;border-radius:16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:#fff;letter-spacing:1px}
    .guided-progress{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
    .guided-progress-fill{height:100%;background:#4A9E6B;border-radius:2px;transition:width .5s linear}
    .guided-actions{display:flex;gap:.6rem;width:100%}
    .btn-guided-prev{flex:1;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:11px;padding:.875rem;font-size:.85rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
    .btn-guided-next{flex:2;background:#4A9E6B;border:none;color:#0A1F12;border-radius:11px;padding:.875rem;font-size:.92rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* ── profundidad sesión ── */
    .why-card{background:#fff;border:.5px solid #E8E6DF;border-radius:11px;padding:.9rem 1rem;font-size:.84rem;color:#3F3E3A;line-height:1.6;font-weight:500}
    .obj-list{display:flex;flex-direction:column;gap:5px}
    .obj-item{background:#fff;border:.5px solid #E8E6DF;border-radius:10px;padding:.7rem .85rem;display:flex;gap:.65rem;align-items:flex-start;cursor:pointer;transition:all .15s}
    .obj-item.done{background:#EBF5EF;border-color:rgba(74,158,107,.3)}
    .obj-check{width:19px;height:19px;border-radius:6px;border:1.5px solid #C8C6BE;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:transparent;flex-shrink:0;margin-top:1px;transition:all .15s}
    .obj-item.done .obj-check{background:#163A28;border-color:#163A28;color:#fff}
    .obj-text{font-size:.82rem;color:#3F3E3A;font-weight:500;line-height:1.45}
    .obj-item.done .obj-text{color:#888780;text-decoration:line-through}
    .graph-card{background:#fff;border:.5px solid #E8E6DF;border-radius:11px;padding:.85rem .75rem .25rem}
    .hint{font-weight:500;color:#B0AEA6;text-transform:none;letter-spacing:0}
    .alts{display:flex;flex-direction:column;gap:6px}
    .alt-card{background:#fff;border:.5px solid #E8E6DF;border-radius:11px;padding:.8rem 1rem}
    .alt-label{font-size:.74rem;font-weight:700;color:#163A28;margin-bottom:.3rem}
    .alt-text{font-size:.8rem;color:#5F5E5A;line-height:1.5;font-weight:500}
    .block{display:block;padding:0}
    .block.expandable{cursor:pointer}
    .block-head{padding:.85rem 1rem;display:flex;align-items:center;gap:.85rem}
    .block-chev{font-size:1rem;color:#B0AEA6;transition:transform .2s;flex-shrink:0}
    .block.open .block-chev{transform:rotate(180deg)}
    .block-more{max-height:0;overflow:hidden;transition:max-height .25s ease}
    .block.open .block-more{max-height:300px;border-top:.5px solid #E8E6DF}
    .more-row{display:flex;gap:.75rem;padding:.55rem 1rem;align-items:flex-start}
    .more-row:not(:last-child){border-bottom:.5px solid #F0EEE8}
    .more-k{font-size:.66rem;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.05em;width:80px;flex-shrink:0;padding-top:1px}
    .more-v{font-size:.8rem;color:#3F3E3A;font-weight:500;line-height:1.45;flex:1}
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="nav">
      <button class="btn-back" onclick="history.back()">←</button>
      <span class="nav-logo">trai<span class="nav-neo">neo</span></span>
    </div>
    <div class="hero-icon" id="h-icon">🏃</div>
    <div class="hero-label">Sesión de entrenamiento</div>
    <div class="hero-title" id="h-title">Sesión</div>
    <div class="hero-bullets" id="h-bullets"></div>
  </div>
  <div class="body" id="body">
    <div class="loading">
      <div class="spinner"></div>
      <p class="loading-text">El coach está preparando<br>el detalle de la sesión...</p>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-ver" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Arriba</button>
  <button class="btn-empezar" id="btn-empezar" disabled onclick="startGuided()">▶ Empezar</button>
</div>

<div class="guided" id="guided">
  <div class="guided-header">
    <div class="guided-step-info" id="g-step-info">Paso 1</div>
    <div class="guided-dots" id="g-dots"></div>
    <button class="btn-close" onclick="closeGuided()">✕</button>
  </div>
  <div class="guided-body" id="g-body"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:.75rem">
    <div class="guided-progress"><div class="guided-progress-fill" id="g-progress" style="width:0%"></div></div>
    <div class="guided-actions">
      <button class="btn-guided-prev" id="g-prev" onclick="prevStep()">← Atrás</button>
      <button class="btn-guided-next" id="g-next" onclick="nextStep()">Siguiente →</button>
    </div>
  </div>
</div>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(s){var m=Math.floor(s/60);var ss=s%60;return m+':'+(ss<10?'0':'')+ss;}

var params=new URLSearchParams(window.location.search);
function gp(k,d){try{return decodeURIComponent(params.get(k)||d||'');}catch(e){return d||'';}}
var title=gp('title','Sesión'),sub=gp('sub',''),why=gp('why','');
var icon=gp('icon','🏃'),tags=gp('tags','');
var fcmax=parseInt(params.get('fcmax'))||185;
var duracio=parseInt(params.get('duracio'))||45;
var nivel=gp('nivel','intermedio'),objetivo=gp('objetivo','');
var pacez2=parseInt(params.get('pacez2'))||null;
var ftp=parseInt(params.get('ftp'))||null;
var musculos=gp('musculos',''),equip=gp('equip','');
var email=gp('email',''),setmana=gp('setmana',''),day=gp('day','');
var tl=title.toLowerCase();
var isCycling=tl.includes('bici')||tl.includes('cicl')||tl.includes('rodada');
var isSwim=tl.includes('piscina')||tl.includes('natación')||tl.includes('nado');

var zones=[
  {key:'z1',label:'Z1',color:'#60B8F0',min:Math.round(fcmax*.50),max:Math.round(fcmax*.60)},
  {key:'z2',label:'Z2',color:'#4A9E6B',min:Math.round(fcmax*.60),max:Math.round(fcmax*.70)},
  {key:'z3',label:'Z3',color:'#F0C84A',min:Math.round(fcmax*.70),max:Math.round(fcmax*.80)},
  {key:'z4',label:'Z4',color:'#F08C30',min:Math.round(fcmax*.80),max:Math.round(fcmax*.90)},
  {key:'z5',label:'Z5',color:'#E04040',min:Math.round(fcmax*.90),max:fcmax}
];
var zoneIdx={z1:0,z2:1,z3:2,z4:3,z5:4};
function zObj(key){return zones[zoneIdx[key]!==undefined?zoneIdx[key]:1];}

var detail=null;

// ─── HERO (instantani) ───
document.getElementById('h-icon').textContent=icon;
document.getElementById('h-title').textContent=title;
var bulletsHTML='';
if(sub) bulletsHTML+='<div class="hero-bullet"><div class="hero-bullet-dot"></div><span>⏱ '+esc(sub)+'</span></div>';
if(why) bulletsHTML+='<div class="hero-bullet"><div class="hero-bullet-dot"></div><span>'+esc(why)+'</span></div>';
document.getElementById('h-bullets').innerHTML=bulletsHTML;

// ─── CARREGAR DETALL ───
function loadDetail(force){
  document.getElementById('body').innerHTML='<div class="loading"><div class="spinner"></div><p class="loading-text">El coach está preparando<br>el detalle de la sesión...</p></div>';
  document.getElementById('btn-empezar').disabled=true;
  fetch('/api/session-detail',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email:email,setmana:setmana,day:day,forceRegenerate:!!force,
      session:{title:title,sub:sub,why:why,tags:tags?tags.split(','):[],duracio_min:duracio},
      userData:{fcmax:fcmax,nivel:nivel,objetivo:objetivo,pacez2:pacez2,ftp:ftp,
        musculos:musculos?musculos.split(','):[],equipamiento:equip||null}
    })
  })
  .then(function(r){return r.json().catch(function(){return {error:'HTTP '+r.status+' — respuesta no-JSON del servidor'};});})
  .then(function(d){
    if(d.error){
      var em=d.error;
      if(d.stop_reason) em+=' · stop:'+d.stop_reason;
      if(d.preview) em+=' · '+d.preview;
      throw new Error(em);
    }
    if(!d.blocks&&!d.exercises) throw new Error('Respuesta sin datos del coach');
    detail=d;
    renderDetail();
    document.getElementById('btn-empezar').disabled=false;
  })
  .catch(function(e){
    console.error(e);
    var msg=(e&&e.message)?e.message:'Error desconocido';
    document.getElementById('body').innerHTML='<div class="err-box"><div class="err-text">No se ha podido cargar el detalle de la sesión.</div><div style="font-size:.68rem;color:#A03030;background:#FBEFEF;border:.5px solid #E5C2C2;border-radius:8px;padding:.6rem .7rem;margin:.55rem 0 .85rem;font-family:ui-monospace,monospace;word-break:break-word;text-align:left;line-height:1.5">'+esc(msg)+'</div><button class="btn-retry" onclick="loadDetail(true)">Reintentar</button></div>';
  });
}

function mainZoneIdx(){
  var best=1,bestMin=-1;
  (detail.blocks||[]).forEach(function(b){
    if((b.minutes||0)>bestMin){bestMin=b.minutes||0;best=zoneIdx[b.zone]!==undefined?zoneIdx[b.zone]:1;}
  });
  return best;
}

function renderDetail(){
  var html='';
  var isGym=detail.kind==='gym';

  if(detail.summary){
    html+='<div class="summary-card"><div class="summary-dot"></div><div class="summary-text">'+esc(detail.summary)+'</div></div>';
  }

  if(detail.why_long){
    html+='<div class="section"><div class="section-title">Por qué esta sesión</div><div class="why-card">'+esc(detail.why_long)+'</div></div>';
  }

  if(detail.objectives&&detail.objectives.length){
    html+='<div class="section"><div class="section-title">Objetivo de hoy</div><div class="obj-list">';
    detail.objectives.forEach(function(o){
      html+='<div class="obj-item" onclick="this.classList.toggle(\'done\')"><div class="obj-check">✓</div><div class="obj-text">'+esc(o)+'</div></div>';
    });
    html+='</div></div>';
  }

  if(!isGym){
    var mz=mainZoneIdx();
    html+='<div class="section"><div class="section-title">Zonas de frecuencia cardíaca</div><div class="zones-row">';
    zones.forEach(function(z,i){
      html+='<div class="zone'+(i===mz?' active':'')+'" style="background:'+z.color+'"><div class="zone-label">'+z.label+'</div><div class="zone-range">'+z.min+'-'+z.max+'</div></div>';
    });
    html+='</div><div class="zone-target">Zona principal: <strong>'+zones[mz].label+' · '+zones[mz].min+'-'+zones[mz].max+' bpm</strong></div></div>';
  }

  if(!isGym&&detail.blocks&&detail.blocks.length){
    html+='<div class="section"><div class="section-title">Perfil de intensidad</div><div class="graph-card">'+intensityGraphSVG(detail.blocks)+'</div></div>';
  }

  if(isGym&&detail.exercises.length){
    html+='<div class="section"><div class="section-title">Ejercicios</div><div class="exercises">';
    detail.exercises.forEach(function(e,i){
      var d=[e.prescription,e.load,e.rest_s?('descanso '+e.rest_s+'s'):'',e.cue].filter(Boolean).join(' · ');
      html+='<div class="exercise"><div class="ex-num">'+String(i+1).padStart(2,'0')+'</div><div class="ex-info"><div class="ex-name">'+esc(e.name)+'</div><div class="ex-detail">'+esc(d)+'</div>'+(e.muscle?'<span class="ex-muscle">'+esc(e.muscle)+'</span>':'')+'</div></div>';
    });
    html+='</div></div>';
  } else if(detail.blocks.length){
    html+='<div class="section"><div class="section-title">Estructura de la sesión <span class="hint">· toca un bloque</span></div><div class="blocks">';
    detail.blocks.forEach(function(b,i){
      var z=zObj(b.zone);
      var t=(b.series&&b.series.reps>1)?('×'+b.series.reps):((b.minutes||0)+"'");
      var hasMore=b.rpe||b.cue||b.feel;
      html+='<div class="block'+(hasMore?' expandable':'')+'" id="blk-'+i+'"'+(hasMore?' onclick="toggleBlock('+i+')"':'')+'>';
      html+='<div class="block-head"><div class="block-dot" style="background:'+z.color+'"></div><div class="block-info"><div class="block-title">'+esc(b.label)+'</div><div class="block-sub">'+esc(b.detail||'')+'</div></div><div class="block-time">'+t+'</div>'+(hasMore?'<div class="block-chev">⌄</div>':'')+'</div>';
      if(hasMore){
        html+='<div class="block-more">';
        if(b.rpe) html+='<div class="more-row"><span class="more-k">Esfuerzo</span><span class="more-v">RPE '+esc(b.rpe)+' / 10</span></div>';
        if(b.feel) html+='<div class="more-row"><span class="more-k">Qué notar</span><span class="more-v">'+esc(b.feel)+'</span></div>';
        if(b.cue) html+='<div class="more-row"><span class="more-k">Técnica</span><span class="more-v">'+esc(b.cue)+'</span></div>';
        html+='</div>';
      }
      html+='</div>';
    });
    html+='</div></div>';
  }

  if(detail.alternatives&&(detail.alternatives.short||detail.alternatives.easy)){
    html+='<div class="section"><div class="section-title">Si hoy no puedes</div><div class="alts">';
    if(detail.alternatives.short) html+='<div class="alt-card"><div class="alt-label">⏱ Versión corta</div><div class="alt-text">'+esc(detail.alternatives.short)+'</div></div>';
    if(detail.alternatives.easy) html+='<div class="alt-card"><div class="alt-label">🪶 Versión fácil</div><div class="alt-text">'+esc(detail.alternatives.easy)+'</div></div>';
    html+='</div></div>';
  }

  if(detail.tip){
    html+='<div class="section"><div class="section-title">Consejo del coach</div><div class="tip"><div class="tip-dot"></div><div class="tip-text">'+esc(detail.tip)+'</div></div></div>';
  }

  html+='<div class="section"><div class="section-title">Exportar</div>';
  if(isGym){
    html+='<div class="export-card"><div><div class="export-title">📋 Hoja de ejercicios</div><div class="export-sub">Imprimible · todos los ejercicios</div></div><button class="btn-export" onclick="downloadGymPDF()">Ver PDF</button></div>';
  } else {
    html+='<div class="export-card"><div><div class="export-title">⌚ Garmin / Polar / Suunto</div><div class="export-sub">Zonas FC + series con distancias</div></div><button class="btn-export" onclick="downloadTCX()">.tcx</button></div>';
  }
  html+='</div>';

  document.getElementById('body').innerHTML=html;
}

function intensityGraphSVG(blocks){
  if(!blocks||!blocks.length) return '';
  var W=320,H=110,padB=18,padT=8,pad=4;
  var plotH=H-padB-padT,plotW=W-pad*2;
  var total=0; blocks.forEach(function(b){total+=(b.minutes||0)||1;});
  if(total<=0) total=1;
  var zc={z1:'#60B8F0',z2:'#4A9E6B',z3:'#F0C84A',z4:'#F08C30',z5:'#E04040'};
  var lvl={z1:1,z2:2,z3:3,z4:4,z5:5};
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg">';
  for(var g=1;g<=5;g++){
    var gy=padT+plotH-(g/5)*plotH;
    svg+='<line x1="'+pad+'" y1="'+gy.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+gy.toFixed(1)+'" stroke="#E8E6DF" stroke-width="0.5"/>';
  }
  var x=pad;
  blocks.forEach(function(b){
    var w=((b.minutes||1)/total)*plotW;
    var L=lvl[b.zone]||2;
    var barH=(L/5)*plotH;
    var y=padT+plotH-barH;
    svg+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+barH.toFixed(1)+'" fill="'+(zc[b.zone]||'#4A9E6B')+'" opacity="0.88"/>';
    x+=w;
  });
  svg+='<text x="'+pad+'" y="'+(H-5)+'" font-size="8" fill="#888780" font-family="Inter">0 min</text>';
  svg+='<text x="'+(W-pad)+'" y="'+(H-5)+'" font-size="8" fill="#888780" font-family="Inter" text-anchor="end">'+Math.round(total)+' min</text>';
  svg+='</svg>';
  return svg;
}
function toggleBlock(i){
  var el=document.getElementById('blk-'+i);
  if(el) el.classList.toggle('open');
}

// ─── EXPORT TCX ───
function downloadTCX(){
  if(!detail) return;
  var sport=isCycling?'Biking':isSwim?'Other':'Running';
  var stepId=1,stepsXML='';
  var blocks=(detail.blocks&&detail.blocks.length)?detail.blocks:[{label:title,minutes:duracio,zone:'z2',series:null}];
  blocks.forEach(function(b){
    var z=zObj(b.zone);
    var ser=b.series;
    if(ser&&ser.reps>1){
      stepsXML+='<Step xsi:type="Repeat_t"><StepId>'+(stepId++)+'</StepId><Repetitions>'+ser.reps+'</Repetitions>';
      stepsXML+='<Child xsi:type="Step_t"><StepId>'+(stepId++)+'</StepId><Name>'+esc(b.label)+'</Name>';
      if(ser.distance_m) stepsXML+='<Duration xsi:type="Distance_t"><Meters>'+ser.distance_m+'</Meters></Duration>';
      else if(ser.time_s) stepsXML+='<Duration xsi:type="Time_t"><Seconds>'+ser.time_s+'</Seconds></Duration>';
      else stepsXML+='<Duration xsi:type="UserInitiated_t"/>';
      stepsXML+='<Intensity>Active</Intensity><Target xsi:type="HeartRate_t"><HeartRateZone xsi:type="CustomHeartRateZone_t"><Low>'+z.min+'</Low><High>'+z.max+'</High></HeartRateZone></Target></Child>';
      stepsXML+='<Child xsi:type="Step_t"><StepId>'+(stepId++)+'</StepId><Name>Descanso</Name><Duration xsi:type="Time_t"><Seconds>'+(ser.rest_s||60)+'</Seconds></Duration><Intensity>Rest</Intensity><Target xsi:type="Open_t"/></Child>';
      stepsXML+='</Step>';
    } else {
      stepsXML+='<Step xsi:type="Step_t"><StepId>'+(stepId++)+'</StepId><Name>'+esc(b.label)+'</Name>';
      stepsXML+='<Duration xsi:type="Time_t"><Seconds>'+((b.minutes||5)*60)+'</Seconds></Duration>';
      stepsXML+='<Intensity>Active</Intensity><Target xsi:type="HeartRate_t"><HeartRateZone xsi:type="CustomHeartRateZone_t"><Low>'+z.min+'</Low><High>'+z.max+'</High></HeartRateZone></Target></Step>';
    }
  });
  var xml='<?xml version="1.0" encoding="UTF-8"?>';
  xml+='<TrainingCenterDatabase xsi:schemaLocation="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2 http://www.garmin.com/xmlschemas/TrainingCenterDatabasev2.xsd" xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">';
  xml+='<Workouts><Workout Sport="'+sport+'"><Name>'+esc(title)+'</Name>'+stepsXML;
  xml+='<ScheduledOn>'+new Date().toISOString().split('T')[0]+'</ScheduledOn></Workout></Workouts></TrainingCenterDatabase>';
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([xml],{type:'application/xml'}));
  a.download=title.replace(/\s+/g,'_')+'.tcx';
  a.click();
}

// ─── EXPORT PDF GIMNÀS ───
function downloadGymPDF(){
  if(!detail) return;
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+esc(title)+'</title>';
  html+='<style>body{font-family:Arial,sans-serif;padding:20px;max-width:600px;margin:0 auto}';
  html+='h1{color:#163A28;border-bottom:2px solid #163A28;padding-bottom:8px}';
  html+='.ex{margin:14px 0;padding:12px;border:1px solid #ddd;border-radius:8px}';
  html+='.n{display:inline-block;background:#163A28;color:#fff;width:26px;height:26px;border-radius:50%;text-align:center;line-height:26px;font-size:13px;margin-right:9px}';
  html+='.nm{font-size:16px;font-weight:bold;color:#111}.dt{color:#555;margin-top:4px;font-size:14px}';
  html+='.ms{background:#EBF5EF;color:#163A28;padding:2px 8px;border-radius:20px;font-size:12px;margin-top:6px;display:inline-block}';
  html+='@media print{body{padding:0}}</style></head><body><h1>'+esc(title)+'</h1>';
  html+='<p style="color:#888;margin-bottom:18px">'+esc(detail.summary||sub)+'</p>';
  (detail.exercises||[]).forEach(function(e,i){
    var d=[e.prescription,e.load,e.rest_s?('descanso '+e.rest_s+'s'):'',e.cue].filter(Boolean).join(' · ');
    html+='<div class="ex"><span class="n">'+(i+1)+'</span><span class="nm">'+esc(e.name)+'</span><div class="dt">'+esc(d)+'</div>'+(e.muscle?'<div class="ms">'+esc(e.muscle)+'</div>':'')+'</div>';
  });
  html+='<p style="margin-top:28px;color:#888;font-size:12px">traineo · '+new Date().toLocaleDateString()+'</p></body></html>';
  var w=window.open('','_blank');
  w.document.write(html);w.document.close();
  setTimeout(function(){w.print();},500);
}

// ─── MODE GUIAT ───
var steps=[],cur=0,timer=null,timeLeft=0;

function buildSteps(){
  steps=[];
  if(detail.kind==='gym'){
    steps.push({type:'intro',title:'¡A por ello!',sub:'Prepara el espacio · calienta 5 min'});
    (detail.exercises||[]).forEach(function(e,i){steps.push({type:'exercise',num:i+1,total:detail.exercises.length,ex:e});});
    steps.push({type:'outro',title:'¡Sesión completada!',sub:'Estira bien y descansa'});
  } else {
    steps.push({type:'intro',title:'¡Vamos!',sub:'Sesión lista · sigue los pasos'});
    (detail.blocks||[]).forEach(function(b){
      if(b.series&&b.series.reps>1){
        for(var i=1;i<=b.series.reps;i++){
          steps.push({type:'serie',num:i,total:b.series.reps,series:b.series,zone:b.zone,label:b.label});
          if(i<b.series.reps) steps.push({type:'descanso',num:i,total:b.series.reps,dur:b.series.rest_s||60});
        }
      } else {
        steps.push({type:'cardio',label:b.label,detail:b.detail,minutes:b.minutes||5,zone:b.zone});
      }
    });
    steps.push({type:'outro',title:'¡Sesión completada!',sub:'Estira bien · hidrátate · descansa'});
  }
}

function startGuided(){if(!detail) return;buildSteps();cur=0;document.getElementById('guided').classList.add('open');renderStep();}
function closeGuided(){clearInterval(timer);document.getElementById('guided').classList.remove('open');}

function renderStep(){
  clearInterval(timer);
  var s=steps[cur],isLast=cur===steps.length-1,isFirst=cur===0;
  var dotsHTML='';
  steps.forEach(function(_,i){
    var cls='gdot';
    if(i<cur) cls+=' done';
    else if(i===cur) cls+=' active';
    else if(steps[i].type==='descanso') cls+=' rest';
    dotsHTML+='<div class="'+cls+'"></div>';
  });
  document.getElementById('g-dots').innerHTML=dotsHTML;
  document.getElementById('g-step-info').textContent='Paso '+(cur+1)+' de '+steps.length;
  document.getElementById('g-prev').style.display=isFirst?'none':'block';
  document.getElementById('g-progress').style.width='0%';
  var b='';

  if(s.type==='serie'){
    var z=zObj(s.zone);
    var big=s.series.distance_m?(s.series.distance_m+' m'):(s.series.time_s?fmt(s.series.time_s):'—');
    document.getElementById('g-next').textContent='Completada ✓';
    b='<div class="guided-type">Serie '+s.num+' de '+s.total+'</div>';
    b+='<div class="guided-big">'+big+'</div>';
    b+='<div class="guided-zone-badge">'+z.label+' · '+z.min+'-'+z.max+' bpm</div>';
    b+='<div class="guided-detail">'+esc(s.label||'')+'</div>';

  } else if(s.type==='descanso'){
    document.getElementById('g-next').textContent='Listo →';
    timeLeft=s.dur||60;var tot=timeLeft;
    b='<div class="guided-type">Descanso '+s.num+' / '+(s.total-1)+'</div>';
    b+='<div class="guided-name">Recupera</div>';
    b+='<div class="guided-timer" id="g-timer">'+fmt(timeLeft)+'</div>';
    b+='<div class="guided-timer-lbl">pulsa Listo cuando estés preparado</div>';
    setTimeout(function(){timer=setInterval(function(){
      timeLeft--;var el=document.getElementById('g-timer');if(el)el.textContent=fmt(timeLeft);
      document.getElementById('g-progress').style.width=((tot-timeLeft)/tot*100)+'%';
      if(timeLeft<=0) clearInterval(timer);
    },1000);},100);

  } else if(s.type==='exercise'){
    document.getElementById('g-next').textContent='Hecho ✓';
    var e=s.ex;
    var dt=[e.prescription,e.load,e.cue].filter(Boolean).join(' · ');
    b='<div class="guided-type">Ejercicio '+s.num+' de '+s.total+'</div>';
    b+='<div class="guided-ex-num">'+String(s.num).padStart(2,'0')+'</div>';
    b+='<div class="guided-name">'+esc(e.name)+'</div>';
    b+='<div class="guided-detail">'+esc(dt)+'</div>';
    b+='<div class="guided-muscle">'+esc(e.muscle||'')+'</div>';

  } else if(s.type==='intro'||s.type==='outro'){
    document.getElementById('g-next').textContent=s.type==='outro'?'¡Cerrar! 🎉':'Empezar →';
    b='<div class="guided-name">'+esc(s.title)+'</div><div class="guided-detail">'+esc(s.sub||'')+'</div>';

  } else {
    document.getElementById('g-next').textContent=isLast?'¡Completado! 🎉':'Siguiente →';
    var z2=zObj(s.zone);
    timeLeft=(s.minutes||1)*60;var tot3=timeLeft;
    b='<div class="guided-type">Bloque</div>';
    b+='<div class="guided-name">'+esc(s.label)+'</div>';
    b+='<div class="guided-zone-badge">'+z2.label+' · '+z2.min+'-'+z2.max+' bpm</div>';
    b+='<div class="guided-timer" id="g-timer">'+fmt(timeLeft)+'</div>';
    b+='<div class="guided-timer-lbl">minutos restantes</div>';
    if(s.detail) b+='<div class="guided-detail">'+esc(s.detail)+'</div>';
    setTimeout(function(){timer=setInterval(function(){
      timeLeft--;var el=document.getElementById('g-timer');if(el)el.textContent=fmt(timeLeft);
      document.getElementById('g-progress').style.width=((tot3-timeLeft)/tot3*100)+'%';
      if(timeLeft<=0){clearInterval(timer);if(!isLast) nextStep();}
    },1000);},100);
  }
  document.getElementById('g-body').innerHTML=b;
}

function nextStep(){if(cur<steps.length-1){cur++;renderStep();}else closeGuided();}
function prevStep(){if(cur>0){cur--;renderStep();}}

loadDetail();
</script>
