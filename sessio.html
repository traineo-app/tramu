// MATCHING PER PARAULES CLAU
function findStruct(t){
  if(structures[t]) return structures[t];
  const tl=t.toLowerCase();
  if(tl.includes('largo')||tl.includes('fondo')) return structures['Rodaje largo'];
  if(tl.includes('recupera')) return structures['Rodaje de recuperación'];
  if(tl.includes('series')&&(tl.includes('bici')||tl.includes('cicl'))) return structures['Series en bici'];
  if(tl.includes('series')&&tl.includes('cuesta')) return structures['Series de cuestas'];
  if(tl.includes('series')||tl.includes('intervalo')||tl.includes('velocidad')) return structures['Series de velocidad'];
  if(tl.includes('brick')) return structures['Brick bici-running'];
  if(tl.includes('trail')) return structures['Trail Z2'];
  if(tl.includes('piscina')||tl.includes('natación')||tl.includes('nado')) return structures['Técnica en piscina'];
  if(tl.includes('ruta')) return structures['Ruta larga'];
  if(tl.includes('bici')||tl.includes('cicl')||tl.includes('rodada')) return structures['Rodada Z2'];
  if(tl.includes('z2')||tl.includes('aeróbico')||tl.includes('rodaje')) return structures['Rodaje Z2'];
  return null;
}

function findGym(t){
  if(gymData[t]) return gymData[t];
  const tl=t.toLowerCase();
  if(tl.includes('inferior')||tl.includes('lower')||tl.includes('pierna')||tl.includes('leg')) return gymData['Fuerza tren inferior'];
  if(tl.includes('superior')||tl.includes('upper')||tl.includes('pecho')||tl.includes('espalda')) return gymData['Fuerza tren superior'];
  if(tl.includes('full body')||tl.includes('funcional')||tl.includes('total')||tl.includes('completo')) return gymData['Full body funcional'];
  if(tl.includes('calistenia')) return gymData['Calistenia básica'];
  if(tl.includes('core')||tl.includes('movilidad')||tl.includes('mobility')) return gymData['Core y movilidad'];
  if(tl.includes('fuerza')||tl.includes('gimnas')||tl.includes('gym')||tl.includes('strength')) return gymData['Full body funcional'];
  return null;
}

  try {
    if(gifCache[exName]){
      const el=document.getElementById(containerId);
      if(el) el.innerHTML=`<img src="${gifCache[exName]}" alt="${exName}" loading="lazy">`;
      return;
    }
    const res=await fetch('/api/exercise?name='+encodeURIComponent(exName.toLowerCase()));
    const data=await res.json();
    if(data.gif){
      gifCache[exName]=data.gif;
      const el=document.getElementById(containerId);
      if(el) el.innerHTML=`<img src="${data.gif}" alt="${exName}" loading="lazy">`;
    }
  } catch(e){ console.log('GIF not found:', exName); }
}

        <button class="btn-tcx" onclick="downloadTCX()">Descargar .tcx</button>

function downloadTCX(){
  const s=struct||[{title,dur:duracio}];
  const z=zones[mainZone];
  const xml=`<?xml version="1.0" encoding="UTF-8"?>
<TrainingCenterDatabase xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2">
  <Workouts><Workout Sport="Running"><Name>${title}</Name>
  ${s.map((b,i)=>`<Step xsi:type="Step_t"><StepId>${i+1}</StepId><Name>${b.title}</Name>
    <Duration xsi:type="Time_t"><Seconds>${b.dur*60}</Seconds></Duration>
    <Intensity>Active</Intensity>
    <Target xsi:type="HeartRate_t"><HeartRateZone xsi:type="CustomHeartRateZone_t">
      <Low>${z.min}</Low><High>${z.max}</High>
    </HeartRateZone></Target></Step>`).join('')}
  </Workout></Workouts>
</TrainingCenterDatabase>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([xml],{type:'application/xml'}));
  a.download=title.replace(/\s+/g,'_')+'.tcx';
  a.click();
}

// MODE GUIAT
let steps=[];
let cur=0;
let timer=null;
let timeLeft=0;

function buildSteps(){
  steps=[];
  if(struct){
    struct.forEach(b=>steps.push({type:'cardio',...b}));
  } else if(exList){
    steps.push({type:'intro',title:'¡A por ello!',sub:'Prepara el espacio · 5 min de calentamiento',dur:5,color:'#60B8F0'});
    exList.forEach(e=>steps.push({type:'exercise',...e}));
    steps.push({type:'outro',title:'¡Sesión completada! 🎉',sub:'Estira bien y descansa',dur:5,color:'#4A9E6B'});
  } else {
    steps.push({type:'cardio',title,sub,dur:duracio,color:'#4EA84A'});
  }
}

function startGuided(){
  buildSteps();
  cur=0;
  document.getElementById('guided').classList.add('open');
  renderStep();
}

function closeGuided(){
  clearInterval(timer);
  document.getElementById('guided').classList.remove('open');
}

function renderStep(){
  clearInterval(timer);
  const s=steps[cur];
  const isLast=cur===steps.length-1;
  const isFirst=cur===0;

  document.getElementById('g-dots').innerHTML=steps.map((_,i)=>
    `<div class="gdot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
  document.getElementById('g-step-info').textContent=`Paso ${cur+1} de ${steps.length}`;
  document.getElementById('g-prev').style.display=isFirst?'none':'block';
  document.getElementById('g-next').textContent=isLast?'¡Completado! 🎉':'Siguiente →';

  let bodyHTML='';

  if(s.type==='exercise'){
    bodyHTML=`
      <div class="guided-type">Ejercicio ${cur} de ${steps.length-2}</div>
      <div class="guided-gif" id="guided-gif-${cur}">
        <div class="guided-gif-spinner"></div>
      </div>
      <div class="guided-name">${s.name}</div>
      <div class="guided-detail">${s.detail}</div>
      <div style="font-size:.8rem;color:rgba(255,255,255,.4);margin-top:.25rem">${s.muscle}</div>`;
    document.getElementById('g-progress').style.width='0%';
  } else {
    timeLeft=(s.dur||1)*60;
    const total=timeLeft;
    bodyHTML=`
      <div class="guided-type">${s.type==='intro'?'Preparación':s.type==='outro'?'¡Completado!':'Bloque'}</div>
      <div class="guided-name">${s.title}</div>
      <div class="guided-detail">${s.sub||''}</div>
      <div class="guided-timer" id="g-timer">${fmt(timeLeft)}</div>
      <div class="guided-timer-lbl">minutos restantes</div>`;
    document.getElementById('g-progress').style.width='0%';
    setTimeout(()=>{
      timer=setInterval(()=>{
        timeLeft--;
        const el=document.getElementById('g-timer');
        if(el) el.textContent=fmt(timeLeft);
        document.getElementById('g-progress').style.width=((total-timeLeft)/total*100)+'%';
        if(timeLeft<=0){clearInterval(timer);if(!isLast) nextStep();}
      },1000);
    },100);
  }

  document.getElementById('g-body').innerHTML=bodyHTML;

  // Carrega GIF al mode guiat
  if(s.type==='exercise'){
    const gifId='guided-gif-'+cur;
    if(gifCache[s.name]){
      const el=document.getElementById(gifId);
      if(el) el.innerHTML=`<img src="${gifCache[s.name]}" alt="${s.name}">`;
    } else {
      loadGifGuided(s.name, gifId);
    }
  }
}

async function loadGifGuided(exName, containerId){
  try {
    const res=await fetch('/api/exercise?name='+encodeURIComponent(exName.toLowerCase()));
    const data=await res.json();
    if(data.gif){
      gifCache[exName]=data.gif;
      const el=document.getElementById(containerId);
      if(el) el.innerHTML=`<img src="${data.gif}" alt="${exName}">`;
    }
  } catch(e){}
}

function nextStep(){if(cur<steps.length-1){cur++;renderStep();}else closeGuided();}
function prevStep(){if(cur>0){cur--;renderStep();}}
function fmt(s){const m=Math.floor(s/60);const ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
