<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>traineo — Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#F1EFE8;min-height:100vh}
    .app{max-width:390px;margin:0 auto;min-height:100vh;background:#F8F7F4;padding-bottom:5rem}

    /* HERO */
    .hero{background:#163A28;padding:1rem 1.25rem 1.5rem}
    .nav{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem}
    .btn-back{background:rgba(255,255,255,0.1);border:none;color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-logo{font-size:1rem;font-weight:400;color:rgba(255,255,255,0.5);letter-spacing:-.2px}
    .nav-neo{color:rgba(255,255,255,0.25)}
    .hero-icon{font-size:2rem;margin-bottom:0.5rem}
    .hero-title{font-size:1.7rem;font-weight:500;color:#fff;letter-spacing:-.4px;margin-bottom:0.3rem}
    .hero-stats{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
    .hero-stat{background:rgba(255,255,255,0.1);border-radius:20px;padding:0.3rem 0.75rem;font-size:0.78rem;color:rgba(255,255,255,0.75);display:flex;align-items:center;gap:0.3rem}
    .hero-why{background:rgba(255,255,255,0.07);border-radius:10px;padding:0.75rem;font-size:0.82rem;color:rgba(255,255,255,0.5);font-style:italic;line-height:1.6}

    /* BODY */
    .body{padding:1.25rem}
    .section{margin-bottom:1.5rem}
    .section-title{font-size:0.72rem;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.75rem}

    /* ZONES */
    .zones-row{display:flex;gap:5px}
    .zone{flex:1;border-radius:8px;padding:7px 3px;text-align:center}
    .zone-label{font-size:0.65rem;font-weight:600;color:#fff}
    .zone-range{font-size:0.58rem;color:rgba(255,255,255,.8);margin-top:2px}
    .zone.dim{opacity:.35}

    /* ESTRUCTURA */
    .blocks{display:flex;flex-direction:column;gap:6px}
    .block{background:#fff;border:.5px solid #E8E6DF;border-radius:10px;padding:.875rem 1rem;display:flex;align-items:center;gap:.75rem}
    .block-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .block-info{flex:1}
    .block-title{font-size:.9rem;font-weight:500;color:#111110;margin-bottom:2px}
    .block-sub{font-size:.75rem;color:#888780}
    .block-time{font-size:.85rem;font-weight:500;color:#163A28;flex-shrink:0}

    /* EXERCICIS */
    .exercises{display:flex;flex-direction:column;gap:8px}
    .exercise{background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:1rem;display:flex;align-items:center;gap:1rem}
    .exercise-figure{width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .exercise-info{flex:1}
    .exercise-name{font-size:.9rem;font-weight:500;color:#111110;margin-bottom:3px}
    .exercise-detail{font-size:.75rem;color:#888780;line-height:1.4}
    .exercise-muscle{display:inline-block;font-size:.68rem;font-weight:500;padding:2px 7px;border-radius:20px;background:#E8F4ED;color:#163A28;margin-top:4px}

    /* TIP */
    .tip{background:#EBF5EF;border-radius:10px;padding:.875rem 1rem;display:flex;gap:.75rem}
    .tip-dot{width:6px;height:6px;border-radius:50%;background:#163A28;margin-top:5px;flex-shrink:0}
    .tip-text{font-size:.82rem;color:#163A28;line-height:1.6}

    /* GPX */
    .gpx-card{background:#111110;border-radius:12px;padding:1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
    .gpx-info{flex:1}
    .gpx-title{font-size:.9rem;font-weight:500;color:#fff;margin-bottom:2px}
    .gpx-sub{font-size:.75rem;color:rgba(255,255,255,.45)}
    .btn-gpx{background:#163A28;border:none;color:#fff;font-size:.8rem;font-weight:500;font-family:'Outfit',sans-serif;padding:.6rem 1rem;border-radius:8px;cursor:pointer;white-space:nowrap}

    /* BOTTOM BUTTONS */
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#F8F7F4;border-top:.5px solid #E8E6DF;padding:.875rem 1.25rem;display:flex;gap:.75rem}
    .btn-start{flex:1;background:#163A28;color:#fff;border:none;border-radius:12px;padding:.9rem;font-size:1rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .btn-detail{background:#fff;border:.5px solid #E8E6DF;color:#163A28;border-radius:12px;padding:.9rem 1.1rem;font-size:.85rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;white-space:nowrap}

    /* MODE GUIAT */
    .guided-overlay{display:none;position:fixed;inset:0;background:#163A28;z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .guided-overlay.open{display:flex}
    .guided-step-label{font-size:.75rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
    .guided-title{font-size:2rem;font-weight:500;color:#fff;letter-spacing:-.4px;text-align:center;margin-bottom:.5rem}
    .guided-sub{font-size:1rem;color:rgba(255,255,255,.55);text-align:center;margin-bottom:2rem}
    .guided-timer{font-size:4rem;font-weight:300;color:#fff;letter-spacing:-2px;margin-bottom:.5rem;font-variant-numeric:tabular-nums}
    .guided-timer-label{font-size:.8rem;color:rgba(255,255,255,.35);margin-bottom:2rem}
    .guided-progress{width:100%;max-width:280px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;margin-bottom:2.5rem}
    .guided-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width .5s linear}
    .guided-actions{display:flex;gap:.75rem;width:100%;max-width:280px}
    .btn-guided-prev{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:12px;padding:.875rem;font-size:.9rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;flex:1}
    .btn-guided-next{background:#fff;border:none;color:#163A28;border-radius:12px;padding:.875rem;font-size:.9rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;flex:2}
    .btn-guided-close{position:absolute;top:1.5rem;right:1.5rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1rem}
    .guided-steps-dots{display:flex;gap:6px;margin-bottom:2rem}
    .step-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
    .step-dot.done{background:#fff}
    .step-dot.current{background:#fff;transform:scale(1.3)}

    /* EXERCICI GUIAT */
    .guided-exercise{display:none;flex-direction:column;align-items:center;width:100%;max-width:320px}
    .guided-exercise.open{display:flex}
    .guided-ex-figure{width:120px;height:120px;margin-bottom:1rem}
    .guided-ex-name{font-size:1.5rem;font-weight:500;color:#fff;text-align:center;margin-bottom:.5rem}
    .guided-ex-detail{font-size:.9rem;color:rgba(255,255,255,.55);text-align:center;margin-bottom:.5rem}
    .guided-ex-sets{font-size:1.1rem;font-weight:500;color:rgba(255,255,255,.8);text-align:center}

    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

  <div class="hero">
    <div class="nav">
      <button class="btn-back" onclick="history.back()">←</button>

  <div class="body">

</div>

<!-- MODE GUIAT -->
<div class="guided-overlay" id="guided">
  <button class="btn-guided-close" onclick="closeGuided()">✕</button>
  <div id="guided-content"></div>
</div>

  const tl=t.toLowerCase();

  if(tl.includes('series')||tl.includes('calidad')||tl.includes('z4')||tl.includes('cuestas')) return 3;

  return 1;

      <p style="font-size:.72rem;color:#888780;margin-top:.5rem">Zona objetivo: <strong style="color:#111110">${zones[mainZone].label} · ${zones[mainZone].min}-${zones[mainZone].max} bpm</strong></p>
    </div>`;
}

              <div class="block-title">${b.title}</div>
              <div class="block-sub">${b.sub}</div>
            </div>

}

// EXERCICIS amb monigotes (gym)

    <div class="section">
      <div class="section-title">Ejercicios</div>

          <div class="exercise">
            <div class="exercise-figure">${figures[e.figure]||figures['default']}</div>

        <button class="btn-gpx" onclick="downloadGPX()">Descargar .fit</button>

// GPX GENERATOR
function downloadGPX(){
  const blocks=structure||[{title:title,durationMin:duracio,color:'#4EA84A'}];
  const zoneTarget=zones[mainZone];
  let gpx=`<?xml version="1.0" encoding="UTF-8"?>
<TrainingCenterDatabase xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2">
  <Workouts>
    <Workout Sport="Running">
      <Name>${title}</Name>
      ${blocks.map(b=>`
      <Step xsi:type="Step_t">
        <StepId>1</StepId>
        <Name>${b.title}</Name>
        <Duration xsi:type="Time_t">
          <Seconds>${(b.durationMin||10)*60}</Seconds>
        </Duration>
        <Intensity>Active</Intensity>
        <Target xsi:type="HeartRate_t">
          <HeartRateZone xsi:type="CustomHeartRateZone_t">
            <Low>${zoneTarget.min}</Low>
            <High>${zoneTarget.max}</High>
          </HeartRateZone>
        </Target>
      </Step>`).join('')}
    </Workout>
  </Workouts>
</TrainingCenterDatabase>`;

  const blob=new Blob([gpx],{type:'application/xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=title.replace(/\s+/g,'_')+'.tcx';
  a.click();
}

// MODE GUIAT
let guidedSteps=[];
let currentStep=0;
let timerInterval=null;
let timeLeft=0;

function buildGuidedSteps(){
  if(structure){
    guidedSteps=structure.map(b=>({type:'cardio',...b}));
  } else if(exList){
    guidedSteps=[
      {type:'intro',title:'¡A por ello!',sub:'Prepara el espacio y calienta 5 min',duration:'5 min',durationMin:5,color:'#60B8F0'},
      ...exList.map(e=>({type:'exercise',...e,duration:'',durationMin:0})),
      {type:'outro',title:'¡Sesión completada!',sub:'Estira y recupera bien',duration:'5 min',durationMin:5,color:'#4EA84A'}
    ];
  }
}

function startGuided(){
  buildGuidedSteps();
  currentStep=0;
  document.getElementById('guided').classList.add('open');
  renderGuidedStep();
}

function closeGuided(){
  document.getElementById('guided').classList.remove('open');
  clearInterval(timerInterval);
}

function renderGuidedStep(){
  clearInterval(timerInterval);
  const step=guidedSteps[currentStep];
  const isLast=currentStep===guidedSteps.length-1;
  const isFirst=currentStep===0;

  const dots=guidedSteps.map((_,i)=>`<div class="step-dot ${i<currentStep?'done':i===currentStep?'current':''}"></div>`).join('');

  let content='';

  if(step.type==='exercise'){
    content=`
      <div class="guided-step-label">Ejercicio ${currentStep} de ${guidedSteps.length-2}</div>
      <div style="width:100px;height:100px;margin-bottom:1rem">${figures[step.figure]||figures['default']}</div>
      <div class="guided-title">${step.name}</div>
      <div class="guided-sub">${step.detail}</div>
      <div style="font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:2rem">${step.muscle}</div>`;
  } else {
    timeLeft=(step.durationMin||1)*60;
    content=`
      <div class="guided-step-label">Paso ${currentStep+1} de ${guidedSteps.length}</div>
      <div class="guided-title">${step.title}</div>
      <div class="guided-sub">${step.sub}</div>
      <div class="guided-timer" id="guided-timer">${formatTime(timeLeft)}</div>
      <div class="guided-timer-label">minutos restantes</div>
      <div class="guided-progress"><div class="guided-progress-fill" id="guided-progress" style="width:0%"></div></div>`;

    setTimeout(()=>{
      const total=(step.durationMin||1)*60;
      timerInterval=setInterval(()=>{
        timeLeft--;
        const el=document.getElementById('guided-timer');
        const pr=document.getElementById('guided-progress');
        if(el) el.textContent=formatTime(timeLeft);
        if(pr) pr.style.width=((total-timeLeft)/total*100)+'%';
        if(timeLeft<=0){
          clearInterval(timerInterval);
          if(!isLast) nextGuidedStep();
        }
      },1000);
    },100);
  }

  document.getElementById('guided-content').innerHTML=`
    <div class="guided-steps-dots">${dots}</div>
    ${content}
    <div class="guided-actions">
      ${!isFirst?`<button class="btn-guided-prev" onclick="prevGuidedStep()">← Anterior</button>`:''}
      <button class="btn-guided-next" onclick="${isLast?'closeGuided()':'nextGuidedStep()'}">
        ${isLast?'¡Completado! 🎉':step.type==='exercise'?'Hecho ✓':'Siguiente →'}
      </button>
    </div>`;
}

function nextGuidedStep(){
  if(currentStep<guidedSteps.length-1){currentStep++;renderGuidedStep();}
}
function prevGuidedStep(){
  if(currentStep>0){currentStep--;renderGuidedStep();}
}
function formatTime(secs){
  const m=Math.floor(secs/60);
  const s=secs%60;
  return m+':'+(s<10?'0':'')+s;
}
function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }
</script>
