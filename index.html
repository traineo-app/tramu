<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>traineo — Entrena con inteligencia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #F1EFE8; }
    .hero { background: #163A28; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .logo-wrap { margin-bottom: 2rem; }
    .logo-name { font-size: 2.5rem; font-weight: 400; color: #fff; letter-spacing: -1px; }
    .logo-neo { color: rgba(255,255,255,0.35); }
    .tagline { font-size: 1rem; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.5rem; }
    h1 { font-size: 2rem; font-weight: 500; color: #fff; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 1rem; max-width: 400px; }
    p { font-size: 1rem; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 2rem; max-width: 360px; }
    .form { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 340px; }
    input { padding: 0.875rem 1rem; border-radius: 10px; border: none; font-size: 1rem; background: rgba(255,255,255,0.1); color: #fff; outline: none; }
    input::placeholder { color: rgba(255,255,255,0.35); }
    button { padding: 0.875rem; background: #fff; color: #163A28; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; }
    .legal { font-size: 0.75rem; color: rgba(255,255,255,0.25); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-wrap">
      <div class="logo-name">trai<span class="logo-neo">neo</span></div>
      <div class="tagline">Entrena con inteligencia</div>
    </div>
    <h1>Fuerza y resistencia. A tu ritmo.</h1>
    <p>Tu entrenador personal con IA para running, ciclismo, triatlón y gimnasio. El plan que se adapta a tu semana, no al revés.</p>
    <div class="form">
      <input type="text" placeholder="Tu nombre">
      <input type="email" placeholder="Tu correo electrónico">
      <button>Quiero acceso anticipado →</button>
    </div>
    <p class="legal">Tus datos deportivos no se venderán nunca.</p>
  </div>
</body>
</html>
